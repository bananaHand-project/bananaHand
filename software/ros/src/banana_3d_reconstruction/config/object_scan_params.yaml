object_scan_node:
  ros__parameters:
    frame_id: object_scan_frame
    device_serial: ""
    color_width: 640
    color_height: 480
    depth_width: 640
    depth_height: 480
    fps: 30
    show_preview: true
    enable_roi_selection: true
    burst_duration_sec: 1.5
    burst_frame_limit: 40
    output_dir: "~/banana_scans"
    output_topic: "/object/point_cloud"
    min_depth_m: 0.15
    max_depth_m: 1.00
    voxel_size_m: 0.005
    plane_distance_threshold_m: 0.008
    min_object_height_above_plane_m: 0.010
    dbscan_eps_m: 0.025
    dbscan_min_points: 60
    icp_max_correspondence_distance_m: 0.040
    icp_fitness_threshold: 0.35
    save_intermediate_debug_clouds: false
    publish_debug_topics: false
    decimation_magnitude: 2
    spatial_filter_magnitude: 2.0
    spatial_filter_alpha: 0.5
    spatial_filter_delta: 20.0
    temporal_filter_alpha: 0.4
    temporal_filter_delta: 20.0
    hole_filling_mode: 1
    plane_ransac_iterations: 300
